/* ─── Root App ──────────────────────────────────────────────────────── */
function App() {
  const [page,    setPage]    = useState("home");
  const [user,    setUser]    = useState(null);
  const [showAuth,setShowAuth]= useState(false);
  const [authMode,setAuthMode]= useState("signin");

  const [booking,  setBooking] = useState({ service:null, date:null, time:null });
  const [toast,    setToast]   = useState(null);

  const showT = (msg, type="ok") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3500);
  };

    if (!user) { setShowAuth(true); setAuthMode("signin"); return; }
    setBooking(b => ({ ...b, service: svc || b.service }));
    setPage("book");
    setBStep(svc ? 2 : 1);
  };

    const ref = "MNK-" + Math.floor(Math.random() * 900 + 100);
    setAppts(a => [...a, {
      id: Date.now(), service: booking.service.name,
      date: booking.date, time: booking.time,
      status: "confirmed", ref

    setBooking({ service:null, date:null, time:null });
    setPage("appointments");
    showT("✅ Appointment booked! Confirmation sent.");

    { id:"profile",      label:"About",    e:"👨‍⚕️" },
    { id:"find",         label:"Find Us",  e:"📍" },

    const modalTimer = setTimeout(() => setShowSessionModal(true), 10000);
    return () => clearTimeout(modalTimer);

          whiteSpace:"nowrap", boxShadow:"0 4px 20px rgba(0,0,0,.25)" }}

          {toast.msg}

          ? <div style={{ display:"flex", alignItems:"center", gap:8 }}>

      {/* ── Pages ── */}

        {page === "services"     && <ServicesPage     doBook={doBook} />}

        width:"100%", background:"#fff",
        borderTop:"1px solid #E4F5F2", display:"flex", zIndex:100,
        boxShadow:"0 -2px 14px rgba(0,0,0,.07)" }}>
        {NAV.map(n => (
          <button key={n.id} onClick={() => setPage(n.id)}
            style={{ flex:1, padding:"8px 2px 6px", background:"none", border:"none",
              cursor:"pointer", display:"flex", flexDirection:"column",

            {page === n.id && <div style={{ width:18, height:2, borderRadius:2, background:B.teal }} />}
          </button>
        ))}
      </div>

      {/* ── Auth Modal ── */}
      {showAuth && (
        <AuthModal mode={authMode} setMode={setAuthMode}
          onClose={() => setShowAuth(false)}
          onAuth={u => { setUser(u); setShowAuth(false); showT(`Welcome, ${u.name.split(" ")[0]}! 👋`); }} />
      )}

      {/* ── Session Modal (10s) ── */}
      {showSessionModal && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.45)",
          zIndex:550, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
          <div className="card slide" style={{ width:"100%", maxWidth:420, padding:"22px 20px" }}>
            <div style={{ fontSize:34, marginBottom:10, textAlign:"center" }}>🦷</div>
            <div style={{ fontFamily:"'Playfair Display',serif", fontSize:22, color:B.dark, fontWeight:700, textAlign:"center", marginBottom:8 }}>
              Need Help Booking?
            </div>
            <p style={{ fontSize:13, color:"#4A6B66", lineHeight:1.65, textAlign:"center", marginBottom:16 }}>
              Pick a service and secure your appointment in under 2 minutes.
            </p>
            <div style={{ display:"flex", gap:10 }}>
              <button className="btn-outline" style={{ flex:1 }}
                onClick={() => setShowSessionModal(false)}>Maybe Later</button>
              <button className="btn-primary" style={{ flex:1 }}
                onClick={() => { setShowSessionModal(false); doBook(null); }}>
                Book Now
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── Chatbot ── */}
      <ChatWidget show={showChat} onToggle={() => setShowChat(p => !p)} />
    </>
  );
}

/* ─── Booking wizard ─────────────────────────────────────────────────── */
function BookPage({ step, setStep, booking, setBooking, onConfirm, user }) {
  const today  = new Date();
  const [yr,  setYr]  = useState(today.getFullYear());
  const [mo,  setMo]  = useState(today.getMonth());

  const dim = new Date(yr, mo + 1, 0).getDate();
  const fd  = new Date(yr, mo, 1).getDay();

  const isDisabled = d => {
    const dt = new Date(yr, mo, d);
    const todayMid = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    return dt < todayMid || dt.getDay() === 0;
  };

  const selDate = d => {
    if (isDisabled(d)) return;
    setBooking(b => ({ ...b,
      date:`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}` }));
  };

  const fmtDate = ds => ds
    ? new Date(ds + "T12:00:00").toLocaleDateString("en-ZA",
        { weekday:"long", day:"numeric", month:"long", year:"numeric" })
    : "";

  const STEPS = ["Service","Date & Time","Confirm"];

  return (
    <div style={{ padding:"18px 14px" }}>
      {/* step indicator */}
      <div style={{ display:"flex", alignItems:"center", marginBottom:22 }}>
        {STEPS.map((s, i) => (
          <div key={s} style={{ display:"flex", alignItems:"center", flex: i < STEPS.length - 1 ? 1 : "none" }}>
            <div style={{ width:26, height:26, borderRadius:"50%",
              background: step > i ? B.primary : step === i + 1 ? B.teal : "#E4F5F2",
              color: step >= i + 1 ? "#fff" : "#9CB8B4",
              display:"flex", alignItems:"center", justifyContent:"center",
              fontSize:11, fontWeight:700, flexShrink:0 }}>
              {step > i + 1 ? "✓" : i + 1}
            </div>
            {i < STEPS.length - 1 &&
              <div style={{ flex:1, height:2,
                background: step > i + 1 ? B.primary : "#E4F5F2", margin:"0 5px" }} />}
          </div>
        ))}
      </div>

      {/* Step 1 — Service */}
      {step === 1 && (
        <div>
          <div style={{ fontFamily:"'Playfair Display',serif", fontSize:20, color:B.dark, fontWeight:700, marginBottom:14 }}>Choose a Service</div>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {SERVICES.map(s => (
              <div key={s.id} className="card"
                style={{ padding:"12px 14px", display:"flex", alignItems:"center", gap:12,
                  cursor:"pointer", transition:"all .15s",
                  border: booking.service?.id === s.id ? `2px solid ${B.teal}` : "2px solid transparent" }}
                onClick={() => setBooking(b => ({ ...b, service:s }))}>
                <span style={{ fontSize:22 }}>{s.icon}</span>
                <div style={{ flex:1 }}>
                  <div style={{ fontWeight:700, fontSize:13, color:B.dark }}>{s.name}</div>
                  <div style={{ fontSize:11, color:"#6B9490" }}>{s.duration} · {s.price}</div>
                </div>
                {booking.service?.id === s.id && <span style={{ color:B.teal, fontSize:20 }}>✓</span>}
              </div>
            ))}
          </div>
          <button className="btn-primary" style={{ width:"100%", marginTop:18,
            opacity: booking.service ? 1 : .45 }}
            onClick={() => { if (booking.service) setStep(2); }}>Next →</button>
        </div>
      )}

      {/* Step 2 — Date & Time */}
      {step === 2 && (
        <div>
          <div style={{ fontFamily:"'Playfair Display',serif", fontSize:20, color:B.dark, fontWeight:700, marginBottom:14 }}>Pick Date & Time</div>
          {/* Calendar */}
          <div className="card" style={{ padding:14, marginBottom:14 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
              <button onClick={() => { mo === 0 ? (setMo(11), setYr(y => y - 1)) : setMo(m => m - 1); }}
                style={{ background:"none", border:"none", fontSize:20, cursor:"pointer", color:B.primary }}>‹</button>
              <span style={{ fontWeight:700, fontSize:14, color:B.dark }}>{MFULL[mo]} {yr}</span>
              <button onClick={() => { mo === 11 ? (setMo(0), setYr(y => y + 1)) : setMo(m => m + 1); }}
                style={{ background:"none", border:"none", fontSize:20, cursor:"pointer", color:B.primary }}>›</button>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3, marginBottom:4 }}>
              {DAYS.map(d => (
                <div key={d} style={{ textAlign:"center", fontSize:10, fontWeight:700, color:"#9CB8B4", padding:"3px 0" }}>{d}</div>
              ))}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3 }}>
              {Array(fd).fill(null).map((_, i) => <div key={`e${i}`} />)}
              {Array(dim).fill(null).map((_, i) => {
                const d   = i + 1;
                const ds  = `${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
                const sel = booking.date === ds;
                const dis = isDisabled(d);
                return (
                  <div key={d} onClick={() => selDate(d)}
                    style={{ aspectRatio:"1", display:"flex", alignItems:"center", justifyContent:"center",
                      borderRadius:"50%", fontSize:12, fontWeight: sel ? 700 : 400,
                      cursor: dis ? "default" : "pointer",
                      background: sel ? B.teal : "transparent",
                      color: sel ? "#fff" : dis ? "#D0E8E4" : B.dark,
                      transition:"all .15s" }}>
                    {d}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Time slots */}
          {booking.date && (
            <div>
              <div style={{ fontWeight:700, color:B.dark, marginBottom:10, fontSize:14 }}>Available Times</div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8 }}>
                {TIMESLOTS.map(t => (
                  <button key={t} onClick={() => setBooking(b => ({ ...b, time:t }))}
                    style={{ padding:"9px", borderRadius:10,
                      border: booking.time === t ? `2px solid ${B.teal}` : "2px solid #E4F5F2",
                      background: booking.time === t ? B.light : "#fff",
                      color: booking.time === t ? B.primary : "#4A6B66",
                      fontWeight:700, fontSize:12, cursor:"pointer" }}>{t}</button>
                ))}
              </div>
            </div>
          )}

          <div style={{ display:"flex", gap:10, marginTop:18 }}>
            <button className="btn-outline" onClick={() => setStep(1)}>← Back</button>
            <button className="btn-primary" style={{ flex:1, opacity: booking.date && booking.time ? 1 : .45 }}
              onClick={() => { if (booking.date && booking.time) setStep(3); }}>Next →</button>
          </div>
        </div>
      )}

      {/* Step 3 — Confirm */}
      {step === 3 && (
        <div>
          <div style={{ fontFamily:"'Playfair Display',serif", fontSize:20, color:B.dark, fontWeight:700, marginBottom:14 }}>Confirm Booking</div>
          <div className="card" style={{ padding:18, marginBottom:12 }}>
            <div style={{ fontSize:34, marginBottom:12 }}>{booking.service?.icon}</div>
            {[
              ["Service",  booking.service?.name],
              ["Date",     fmtDate(booking.date)],
              ["Time",     booking.time],
              ["Duration", booking.service?.duration],
              ["Price",    booking.service?.price],
              ["Dentist",  "Dr. L.M. Mankgele"],
            ].map(([l, v]) => (
              <div key={l} style={{ display:"flex", justifyContent:"space-between",
                padding:"7px 0", borderBottom:"1px solid #F0FAF8" }}>
                <span style={{ color:"#6B9490", fontSize:12 }}>{l}</span>
                <span style={{ fontWeight:700, fontSize:12, color:B.dark, textAlign:"right", maxWidth:200 }}>{v}</span>
              </div>
            ))}
          </div>
          {user && (
            <div className="card" style={{ padding:14, marginBottom:12, background:B.light }}>
              <div style={{ fontSize:11, color:B.secondary, fontWeight:700, marginBottom:6 }}>📧 Confirmation will be sent to:</div>
              <div style={{ fontWeight:700, color:B.dark, fontSize:13 }}>{user.name}</div>
              <div style={{ color:"#6B9490", fontSize:12 }}>{user.email} {user.phone && `· ${user.phone}`}</div>
            </div>
          )}
          <div style={{ background:"#FFF8E7", borderRadius:12, padding:12,
            marginBottom:16, fontSize:12, color:"#8B6914" }}>
            ⚠️ Please arrive 10 minutes early. Cancellations need 24 hours' notice.
          </div>
          <div style={{ display:"flex", gap:10 }}>
            <button className="btn-outline" onClick={() => setStep(2)}>← Back</button>
            <button className="btn-primary" style={{ flex:1 }} onClick={onConfirm}>Confirm ✓</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── Appointments ──────────────────────────────────────────────────── */
function ApptsPage({ appts, setAppts, doBook, showT }) {
  const [tab, setTab] = useState("upcoming");
  const now     = new Date();
  const todayMs = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();

  const upcoming = appts.filter(a => a.status !== "cancelled" && new Date(a.date + "T12:00:00").getTime() >= todayMs);
  const past     = appts.filter(a => a.status === "cancelled"  || new Date(a.date + "T12:00:00").getTime()  < todayMs);
  const shown    = tab === "upcoming" ? upcoming : past;

  const cancel = id => { setAppts(p => p.map(x => x.id === id ? { ...x, status:"cancelled" } : x)); showT("Appointment cancelled."); };

  return (
    <div style={{ padding:"18px 14px" }}>
      <div style={{ fontFamily:"'Playfair Display',serif", fontSize:22, color:B.dark, fontWeight:700, marginBottom:4 }}>My Appointments</div>
      <div style={{ color:"#6B9490", fontSize:13, marginBottom:16 }}>Manage your dental bookings.</div>

      <div style={{ display:"flex", background:"#F0FAF8", borderRadius:50, padding:3, marginBottom:16 }}>
        {[["upcoming",`Upcoming (${upcoming.length})`],["past",`History (${past.length})`]].map(([t,l]) => (
          <button key={t} onClick={() => setTab(t)}
            style={{ flex:1, padding:"7px", borderRadius:50, border:"none",
              background: tab === t ? "#fff" : "transparent",
              color: tab === t ? B.primary : "#6B9490",
              fontWeight:700, fontSize:12, cursor:"pointer",
              boxShadow: tab === t ? "0 2px 8px rgba(0,0,0,.1)" : "none",
              transition:"all .2s" }}>{l}</button>
        ))}
      </div>

      {shown.length === 0
        ? <div style={{ textAlign:"center", padding:"50px 20px" }}>
            <div style={{ fontSize:50, marginBottom:12 }}>📅</div>
            <div style={{ fontFamily:"'Playfair Display',serif", color:B.dark, fontSize:18, marginBottom:8 }}>No appointments yet</div>
            <div style={{ color:"#6B9490", fontSize:13, marginBottom:20 }}>Book your first visit with Dr. Mankgele today.</div>
            <button className="btn-primary" onClick={() => doBook(null)}>Book Appointment</button>
          </div>
        : <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            {shown.map(a => (
              <div key={a.id} className="card" style={{ padding:16 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
                  <div>
                    <div style={{ fontWeight:700, fontSize:14, color:B.dark }}>{a.service}</div>
                    <div style={{ fontSize:11, color:"#6B9490", marginTop:2 }}>Ref: {a.ref}</div>
                  </div>
                  <span style={{ background: a.status === "confirmed" ? "#E4F5F2" : "#FFE8E8",
                    color: a.status === "confirmed" ? B.primary : "#C0392B",
                    borderRadius:50, padding:"3px 10px", fontSize:10, fontWeight:700 }}>
                    {a.status === "confirmed" ? "✓ Confirmed" : "Cancelled"}
                  </span>
                </div>
                <div style={{ display:"flex", gap:14, fontSize:12, color:"#4A6B66", marginBottom:10 }}>
                  <span>📅 {new Date(a.date+"T12:00:00").toLocaleDateString("en-ZA",{day:"numeric",month:"short",year:"numeric"})}</span>
                  <span>⏰ {a.time}</span>
                </div>
                <div style={{ fontSize:11, color:"#6B9490", marginBottom: a.status==="confirmed" ? 12 : 0 }}>
                  Dr. L.M. Mankgele · 72 Ruiter Road, Mokopane
                </div>
                {a.status === "confirmed" && (
                  <div style={{ display:"flex", gap:8 }}>
                    <button onClick={() => cancel(a.id)}
                      style={{ flex:1, padding:"7px", borderRadius:50,
                        border:"2px solid #E8D0D0", background:"#fff",
                        color:"#C0392B", fontWeight:700, fontSize:12, cursor:"pointer" }}>Cancel</button>
                    <button onClick={() => doBook(null)}
                      style={{ flex:1, padding:"7px", borderRadius:50,
                        border:`2px solid ${B.teal}`, background:"#fff",
                        color:B.secondary, fontWeight:700, fontSize:12, cursor:"pointer" }}>Reschedule</button>
                  </div>
                )}
              </div>
            ))}
          </div>
      }
    </div>
  );
}

    const e = {};
    if (mode === "signup" && !form.name.trim()) e.name = "Full name is required";
    if (mode === "signup" && !form.phone.trim()) e.phone = "Phone number is required";
    if (!form.email.includes("@")) e.email = "Valid email address required";
    if (form.pass.length < 6) e.pass = "Password must be at least 6 characters";
    return e;
  };

  const submit = () => {
    const e = validate();
    if (Object.keys(e).length) { setErr(e); return; }
    onAuth({ name: form.name || form.email.split("@")[0], email: form.email, phone: form.phone });
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.55)",
      zIndex:500, display:"flex", alignItems:"flex-end", justifyContent:"center" }}
      onClick={onClose}>
      <div className="card slide" style={{ width:"100%", maxWidth:560,
        borderRadius:"22px 22px 0 0", padding:"28px 20px" }}
        onClick={e => e.stopPropagation()}>
        <div style={{ textAlign:"center", marginBottom:20 }}>
          <div style={{ fontSize:40, marginBottom:8 }}>🦷</div>
          <div style={{ fontFamily:"'Playfair Display',serif", fontSize:20, color:B.dark, fontWeight:700 }}>
            {mode === "signin" ? "Welcome Back" : "Create Account"}
          </div>
          <div style={{ color:"#6B9490", fontSize:13 }}>
            {mode === "signin" ? "Sign in to manage your appointments" : "Join to book and manage appointments"}
          </div>
        </div>

        {mode === "signup" && (
          <>
            <input placeholder="Full Name" value={form.name}
              onChange={e => setForm(f => ({ ...f, name:e.target.value }))}
              style={{ width:"100%", padding:"11px 14px", borderRadius:10, marginBottom:err.name?4:10,
                border:`2px solid ${err.name?"#E74C3C":"#E4F5F2"}`, fontSize:13, outline:"none" }} />
            {err.name && <div style={{ color:"#E74C3C", fontSize:11, marginBottom:8 }}>{err.name}</div>}

            <input placeholder="Phone Number (e.g. 076 123 4567)" value={form.phone}
              onChange={e => setForm(f => ({ ...f, phone:e.target.value }))}
              style={{ width:"100%", padding:"11px 14px", borderRadius:10, marginBottom:err.phone?4:10,
                border:`2px solid ${err.phone?"#E74C3C":"#E4F5F2"}`, fontSize:13, outline:"none" }} />
            {err.phone && <div style={{ color:"#E74C3C", fontSize:11, marginBottom:8 }}>{err.phone}</div>}
          </>
        )}

        <input placeholder="Email Address" value={form.email}
          onChange={e => setForm(f => ({ ...f, email:e.target.value }))}
          style={{ width:"100%", padding:"11px 14px", borderRadius:10, marginBottom:err.email?4:10,
            border:`2px solid ${err.email?"#E74C3C":"#E4F5F2"}`, fontSize:13, outline:"none" }} />
        {err.email && <div style={{ color:"#E74C3C", fontSize:11, marginBottom:8 }}>{err.email}</div>}

        <input type="password" placeholder="Password" value={form.pass}
          onChange={e => setForm(f => ({ ...f, pass:e.target.value }))}
          style={{ width:"100%", padding:"11px 14px", borderRadius:10, marginBottom:err.pass?4:18,
            border:`2px solid ${err.pass?"#E74C3C":"#E4F5F2"}`, fontSize:13, outline:"none" }} />
        {err.pass && <div style={{ color:"#E74C3C", fontSize:11, marginBottom:14 }}>{err.pass}</div>}

        <button className="btn-primary" style={{ width:"100%", marginBottom:14 }} onClick={submit}>
          {mode === "signin" ? "Sign In" : "Create Account"}
        </button>
        <div style={{ textAlign:"center", fontSize:13, color:"#6B9490" }}>
          {mode === "signin" ? "Don't have an account? " : "Already have an account? "}
          <span style={{ color:B.secondary, fontWeight:700, cursor:"pointer" }}
            onClick={() => setMode(mode === "signin" ? "signup" : "signin")}>
            {mode === "signin" ? "Sign Up" : "Sign In"}
          </span>
        </div>
      </div>
    </div>
  );
}

/* ─── Chat Widget ───────────────────────────────────────────────────── */
function ChatWidget({ show, onToggle }) {
  const [msgs, setMsgs] = useState([
    { from:"bot", text:"👋 Hi! I'm Dr. Mankgele's dental assistant. How can I help you today?" }
  ]);
  const [inp, setInp] = useState("");
  const [fabTop, setFabTop] = useState(120);
  const [showPrompt, setShowPrompt] = useState(false);
  const endRef = useRef(null);

  useEffect(() => {
    if (endRef.current) endRef.current.scrollIntoView({ behavior:"smooth" });
  }, [msgs, show]);

  useEffect(() => {
    const placeChat = () => {
      const rootEl = document.getElementById("root");
      if (!rootEl) return;

      const rootRect = rootEl.getBoundingClientRect();
      const rootTopInDoc = window.scrollY + rootRect.top;
      const nextTop = window.scrollY - rootTopInDoc + window.innerHeight - 74;
      const minTop = 70;
      const maxTop = Math.max(minTop, rootEl.scrollHeight - 66);
      setFabTop(Math.min(maxTop, Math.max(minTop, nextTop)));
    };

    placeChat();
    window.addEventListener("scroll", placeChat, { passive: true });
    window.addEventListener("resize", placeChat);
    return () => {
      window.removeEventListener("scroll", placeChat);
      window.removeEventListener("resize", placeChat);
    };
  }, []);

  useEffect(() => {
    const promptTimer = setTimeout(() => {
      const promptText = "Hey, you can ask me anything";
      setMsgs(m => m.some(msg => msg.text === promptText) ? m : [...m, { from:"bot", text:promptText }]);
      setShowPrompt(true);
    }, 20000);
    return () => clearTimeout(promptTimer);
  }, []);

  useEffect(() => {
    if (!showPrompt || show) return;
    const hideTimer = setTimeout(() => setShowPrompt(false), 6000);
    return () => clearTimeout(hideTimer);
  }, [showPrompt, show]);

  useEffect(() => {
    if (show) setShowPrompt(false);
  }, [show]);

  const send = txt => {
    if (!txt.trim()) return;
    setMsgs(m => [...m, { from:"user", text:txt }]);
    setInp("");
    setTimeout(() => {
      const lower = txt.toLowerCase();
      const faq   = FAQS.find(f =>
        f.q.toLowerCase().split(" ").some(w => w.length > 3 && lower.includes(w))
      );
      const reply = faq
        ? faq.a
        : "I'm not sure about that — please call us on 076 405 8326 or email lethabomankgele@gmail.com for assistance!";
      setMsgs(m => [...m, { from:"bot", text:reply }]);
    }, 700);
  };

  return (
    <>
      {!show && showPrompt && (
        <div className="fade" style={{ position:"absolute", top:Math.max(12, fabTop - 42), right:72,
          background:"#fff", color:B.dark, borderRadius:12, padding:"9px 12px",
          fontSize:12, fontWeight:700, boxShadow:"0 8px 20px rgba(0,0,0,.14)",
          border:"1px solid #E4F5F2", zIndex:210, cursor:"pointer" }}
          onClick={onToggle}>
          Hey, you can ask me anything
        </div>
      )}

      {/* FAB */}
      <button onClick={onToggle}
        style={{ position:"absolute", top:fabTop, right:16, width:50, height:50,
          borderRadius:"50%", background:`linear-gradient(135deg,${B.primary},${B.teal})`,
          border:"none", cursor:"pointer",
          boxShadow:"0 4px 18px rgba(13,92,78,.45)",
          zIndex:200, fontSize:22, display:"flex",
          alignItems:"center", justifyContent:"center", color:"#fff" }}>
        {show ? "✕" : "💬"}
        {!show && (
          <div className="pulse" style={{ position:"absolute", top:4, right:4,
            width:12, height:12, borderRadius:"50%",
            background:"#E74C3C", border:"2px solid #fff" }} />
        )}
      </button>

      {show && (
        <div className="card slide"
          style={{ position:"absolute", top:Math.max(16, fabTop - 312), right:14,
            width:300, maxWidth:"calc(100vw - 28px)",
            display:"flex", flexDirection:"column", maxHeight:400, zIndex:200 }}>
          {/* header */}
          <div style={{ background:`linear-gradient(135deg,${B.primary},${B.secondary})`,
            borderRadius:"16px 16px 0 0", padding:"12px 14px",
            display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ width:34, height:34, borderRadius:"50%",
              background:"rgba(255,255,255,.2)", display:"flex",
              alignItems:"center", justifyContent:"center", fontSize:18 }}>🦷</div>
            <div>
              <div style={{ color:"#fff", fontWeight:700, fontSize:13 }}>Dental Assistant</div>
              <div style={{ color:"rgba(255,255,255,.7)", fontSize:10 }}>● Online · Dr. Mankgele Practice</div>
            </div>
          </div>

          {/* quick chips */}
          <div style={{ padding:"8px 10px 0", display:"flex", gap:6, flexWrap:"wrap" }}>
            {["Hours?","Location?","Specials?","Book?","Pain?"].map(q => (
              <button key={q} onClick={() => send(q)}
                style={{ background:B.light, color:B.primary, border:"none",
                  borderRadius:50, padding:"3px 10px", fontSize:10, fontWeight:700, cursor:"pointer" }}>{q}</button>
            ))}
          </div>

          {/* messages */}
          <div style={{ flex:1, overflowY:"auto", padding:"10px 12px",
            display:"flex", flexDirection:"column", gap:8, minHeight:140 }}>
            {msgs.map((m, i) => (
              <div key={i} style={{ display:"flex", justifyContent: m.from==="user" ? "flex-end" : "flex-start" }}>
                <div style={{ maxWidth:"82%", padding:"9px 12px",
                  borderRadius: m.from==="user" ? "16px 16px 4px 16px" : "16px 16px 16px 4px",
                  background: m.from==="user" ? B.primary : "#F0FAF8",
                  color: m.from==="user" ? "#fff" : B.dark,
                  fontSize:12, lineHeight:1.5 }}>{m.text}</div>
              </div>
            ))}
            <div ref={endRef} />
          </div>

          {/* input */}
          <div style={{ padding:"8px 10px", borderTop:"1px solid #F0FAF8",
            display:"flex", gap:6 }}>
            <input value={inp} onChange={e => setInp(e.target.value)}
              onKeyDown={e => e.key === "Enter" && send(inp)}
              placeholder="Ask anything..."
              style={{ flex:1, padding:"7px 12px", borderRadius:50,
                border:"2px solid #E4F5F2", fontSize:12, outline:"none" }} />
            <button onClick={() => send(inp)}
              style={{ width:32, height:32, borderRadius:"50%",
                background:B.teal, border:"none", color:"#fff",
                cursor:"pointer", fontSize:16, display:"flex",
                alignItems:"center", justifyContent:"center" }}>→</button>
          </div>
        </div>
      )}
    </>
  );
}

/* ─── Mount ──────────────────────────────────────────────────────────── */
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
