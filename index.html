function BookPage({step,setStep,booking,setBooking,onConfirm,user}){
  const today=new Date();
  const [yr,setYr]=useState(today.getFullYear());
  const [mo,setMo]=useState(today.getMonth());
  const dim=new Date(yr,mo+1,0).getDate();
  const fd=new Date(yr,mo,1).getDay();
  const isOff=d=>{const dt=new Date(yr,mo,d);const t=new Date(today.getFullYear(),today.getMonth(),today.getDate());return dt<t||dt.getDay()===0;};
  const selDate=d=>{if(isOff(d))return;setBooking(b=>(({...b,date:`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`})));};
  const fmtDate=ds=>ds?new Date(ds+"T12:00:00").toLocaleDateString("en-ZA",{weekday:"long",day:"numeric",month:"long",year:"numeric"}):"";

  return <div style={{maxWidth:800,margin:"0 auto",padding:"40px 40px"}}>

    <div style={{display:"flex",alignItems:"center",marginBottom:32}}>
      {["Choose Service","Select Date & Time","Confirm"].map((s,i)=>(

          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:28,height:28,borderRadius:"50%",background:step>i?B.primary:step===i+1?B.teal:"#E4F5F2",color:step>=i+1?"#fff":"#9CB8B4",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}}>{step>i+1?"✓":i+1}</div>
            <span style={{fontSize:13,fontWeight:600,color:step===i+1?B.dark:"#9CB8B4",whiteSpace:"nowrap",display:"none"}} className="desktop-only">{s}</span>
          </div>
          {i<2&&<div style={{flex:1,height:2,background:step>i+1?B.primary:"#E4F5F2",margin:"0 8px"}}/>}
        </div>
      ))}
    </div>

    {step===1&&<div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:12}}>
        {SERVICES.map(s=>(
          <div key={s.id} className={`service-card ${booking.service?.id===s.id?"selected":""}`} onClick={()=>setBooking(b=>(({...b,service:s})))}>
            <span style={{fontSize:28}}>{s.icon}</span>
            <div style={{fontWeight:700,fontSize:14,color:B.dark,margin:"8px 0 3px"}}>{s.name}</div>
            <div style={{fontSize:12,color:"#6B9490",marginBottom:4}}>{s.duration} · {s.price}</div>
            {booking.service?.id===s.id&&<span style={{color:B.teal,fontWeight:700,fontSize:13}}>✓ Selected</span>}

      </div>
    </div>}

    {step===2&&<div className="desktop-two-col" style={{display:"block"}}>
      <div className="card" style={{padding:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <button onClick={()=>{mo===0?(setMo(11),setYr(y=>y-1)):setMo(m=>m-1);}} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:B.primary}}>‹</button>
          <span style={{fontWeight:700,fontSize:16,color:B.dark}}>{MFULL[mo]} {yr}</span>
          <button onClick={()=>{mo===11?(setMo(0),setYr(y=>y+1)):setMo(m=>m+1);}} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:B.primary}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}>

        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
          {Array(fd).fill(null).map((_,i)=><div key={`e${i}`}/>)}

            const d=i+1,ds=`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`,isSel=booking.date===ds,dis=isOff(d);

        </div>
      </div>
    </div>}

    {step===3&&<div style={{maxWidth:560}}>
      <div className="card" style={{padding:24,marginBottom:16}}>
        <div style={{fontSize:36,marginBottom:14}}>{booking.service?.icon}</div>
        {[["Service",booking.service?.name],["Date",fmtDate(booking.date)],["Time",booking.time],["Duration",booking.service?.duration],["Price",booking.service?.price],["Dentist","Dr. L.M. Mankgele"]].map(([l,v])=>(
          <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid #F0FAF8"}}>
            <span style={{color:"#6B9490",fontSize:13}}>{l}</span>
            <span style={{fontWeight:700,fontSize:13,color:B.dark}}>{v}</span>
          </div>
        ))}
      </div>
      {user&&<div className="card" style={{padding:16,marginBottom:16,background:B.light}}>
        <div style={{fontSize:12,color:B.secondary,fontWeight:700,marginBottom:6}}>📧 Confirmation will be sent to:</div>

        <div style={{color:"#6B9490",fontSize:13}}>{user.email} {user.phone&&`· ${user.phone}`}</div>

        <button className="btn-p" style={{flex:1,fontSize:15,padding:13}} onClick={onConfirm}>Confirm Appointment ✓</button>
      </div>
    </div>}
  </div>;
}

function ApptsPage({appts,setAppts,doBook,showT}){

/* ── Auth Modal ── */
function AuthModal({mode,setMode,onClose,onAuth}){
  const [form,setForm]=useState({name:"",phone:"",email:"",pass:""});
  const [err,setErr]=useState({});
  const validate=()=>{
    const e={};
    if(mode==="signup"&&!form.name.trim())e.name="Full name required";
    if(mode==="signup"&&!form.phone.trim())e.phone="Phone number required";
    if(!form.email.includes("@"))e.email="Valid email address required";
    if(form.pass.length<6)e.pass="Password must be at least 6 characters";
    return e;
  };
  const submit=()=>{const e=validate();if(Object.keys(e).length){setErr(e);return;}onAuth({name:form.name||form.email.split("@")[0],email:form.email,phone:form.phone});};
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={onClose}>
    <div className="card slide" style={{width:"100%",maxWidth:460,padding:36,borderRadius:24}} onClick={e=>e.stopPropagation()}>
      <div style={{textAlign:"center",marginBottom:24}}>
        <div style={{fontSize:44,marginBottom:10}}>🦷</div>
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:B.dark,fontWeight:700,marginBottom:6}}>{mode==="signin"?"Welcome Back":"Create Account"}</h2>
        <p style={{color:"#6B9490",fontSize:14}}>{mode==="signin"?"Sign in to manage your appointments":"Join to book and manage appointments"}</p>
      </div>
      {mode==="signup"&&<>
        <input placeholder="Full Name" value={form.name} onChange={e=>setForm(f=>(({...f,name:e.target.value})))}
          style={{width:"100%",padding:"12px 16px",borderRadius:10,marginBottom:err.name?4:12,border:`2px solid ${err.name?"#E74C3C":"#E4F5F2"}`,fontSize:14,outline:"none"}}/>
        {err.name&&<div style={{color:"#E74C3C",fontSize:12,marginBottom:10}}>{err.name}</div>}
        <input placeholder="Phone Number" value={form.phone} onChange={e=>setForm(f=>(({...f,phone:e.target.value})))}
          style={{width:"100%",padding:"12px 16px",borderRadius:10,marginBottom:err.phone?4:12,border:`2px solid ${err.phone?"#E74C3C":"#E4F5F2"}`,fontSize:14,outline:"none"}}/>
        {err.phone&&<div style={{color:"#E74C3C",fontSize:12,marginBottom:10}}>{err.phone}</div>}
      </>}
      <input placeholder="Email Address" value={form.email} onChange={e=>setForm(f=>(({...f,email:e.target.value})))}
        style={{width:"100%",padding:"12px 16px",borderRadius:10,marginBottom:err.email?4:12,border:`2px solid ${err.email?"#E74C3C":"#E4F5F2"}`,fontSize:14,outline:"none"}}/>
      {err.email&&<div style={{color:"#E74C3C",fontSize:12,marginBottom:10}}>{err.email}</div>}
      <input type="password" placeholder="Password" value={form.pass} onChange={e=>setForm(f=>(({...f,pass:e.target.value})))}
        style={{width:"100%",padding:"12px 16px",borderRadius:10,marginBottom:err.pass?4:20,border:`2px solid ${err.pass?"#E74C3C":"#E4F5F2"}`,fontSize:14,outline:"none"}}/>
      {err.pass&&<div style={{color:"#E74C3C",fontSize:12,marginBottom:16}}>{err.pass}</div>}
      <button className="btn-p" style={{width:"100%",fontSize:15,padding:13,marginBottom:14}} onClick={submit}>{mode==="signin"?"Sign In":"Create Account"}</button>
      <div style={{textAlign:"center",fontSize:14,color:"#6B9490"}}>{mode==="signin"?"No account? ":"Have an account? "}<span style={{color:B.secondary,fontWeight:700,cursor:"pointer"}} onClick={()=>setMode(mode==="signin"?"signup":"signin")}>{mode==="signin"?"Sign Up":"Sign In"}</span></div>
    </div>
  </div>;
}

/* ── Chat Widget ── */
function ChatWidget({show,onToggle}){
  const [msgs,setMsgs]=useState([{from:"bot",text:"👋 Hi! I'm Dr. Mankgele's dental assistant. Ask me anything about our services, location, or hours!"}]);
  const [inp,setInp]=useState("");
  const endRef=useRef(null);
  useEffect(()=>{if(endRef.current)endRef.current.scrollIntoView({behavior:"smooth"});}, [msgs,show]);
  const send=txt=>{
    if(!txt.trim())return;
    setMsgs(m=>[...m,{from:"user",text:txt}]);setInp("");
    setTimeout(()=>{
      const lower=txt.toLowerCase();
      const faq=FAQS.find(f=>f.q.toLowerCase().split(" ").some(w=>w.length>3&&lower.includes(w)));
      setMsgs(m=>[...m,{from:"bot",text:faq?faq.a:"I'm not sure about that — please call us on 076 405 8326 or email lethabomankgele@gmail.com!"}]);
    },700);
  };
  return <>
    <button onClick={onToggle} style={{position:"fixed",bottom:90,right:20,width:54,height:54,borderRadius:"50%",background:`linear-gradient(135deg,${B.primary},${B.teal})`,border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(13,92,78,.45)",zIndex:200,fontSize:24,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff"}}>
      {show?"✕":"💬"}
      {!show&&<div className="pulse" style={{position:"absolute",top:4,right:4,width:13,height:13,borderRadius:"50%",background:"#E74C3C",border:"2px solid #fff"}}/>}
    </button>
    {show&&<div className="card slide" style={{position:"fixed",bottom:158,right:20,width:340,maxWidth:"calc(100vw - 40px)",display:"flex",flexDirection:"column",maxHeight:440,zIndex:200}}>
      <div style={{background:`linear-gradient(135deg,${B.primary},${B.secondary})`,borderRadius:"16px 16px 0 0",padding:"14px 16px",display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:36,height:36,borderRadius:"50%",background:"rgba(255,255,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🦷</div>
        <div><div style={{color:"#fff",fontWeight:700,fontSize:14}}>Dental Assistant</div><div style={{color:"rgba(255,255,255,.7)",fontSize:11}}>● Online · Dr. Mankgele Practice</div></div>
      </div>
      <div style={{padding:"8px 10px 0",display:"flex",gap:6,flexWrap:"wrap"}}>
        {["Hours?","Location?","Specials?","Book?","Children?"].map(q=><button key={q} onClick={()=>send(q)} style={{background:B.light,color:B.primary,border:"none",borderRadius:50,padding:"4px 12px",fontSize:11,fontWeight:700,cursor:"pointer"}}>{q}</button>)}
      </div>
      <div style={{flex:1,overflowY:"auto",padding:"10px 12px",display:"flex",flexDirection:"column",gap:8,minHeight:160}}>
        {msgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.from==="user"?"flex-end":"flex-start"}}>
          <div style={{maxWidth:"82%",padding:"9px 13px",borderRadius:m.from==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",background:m.from==="user"?B.primary:"#F0FAF8",color:m.from==="user"?"#fff":B.dark,fontSize:13,lineHeight:1.5}}>{m.text}</div>
        </div>)}
        <div ref={endRef}/>
      </div>
      <div style={{padding:"8px 10px",borderTop:"1px solid #F0FAF8",display:"flex",gap:6}}>
        <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send(inp)} placeholder="Ask anything..." style={{flex:1,padding:"8px 14px",borderRadius:50,border:"2px solid #E4F5F2",fontSize:13,outline:"none"}}/>
        <button onClick={()=>send(inp)} style={{width:34,height:34,borderRadius:"50%",background:B.teal,border:"none",color:"#fff",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>→</button>
      </div>
    </div>}
  </>;
}
